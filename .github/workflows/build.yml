name: Build

on:
  pull_request:
    paths-ignore:
      - "doc/**"
      - "README.md"
      - ".github/workflows/*.yml"
      - "!.github/workflows/build.yml"
  schedule:
    # Run every day at 03:00 AM
    - cron: "00 3 * * *"
  workflow_call:
    inputs:
      trigger_source:
        description: 'Trigger source'
        required: true
        type: string


jobs:
  build-and-test-in-toolchain-bundle:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Serial Modem repository
        uses: actions/checkout@v4
        with:
          path: serial_modem

      - name: Install build libraries for native_sim
        run: |
          sudo apt-get update
          sudo apt install libc6-dev-i386

      - name: Prepare west project
        run: |
          python3 -m pip install west
          west init -l serial_modem
          west update -o=--depth=1 -n

      - name: Install nrfutil and toolchain manager
        run: |
            wget -q https://files.nordicsemi.com/artifactory/swtools/external/nrfutil/executables/x86_64-unknown-linux-gnu/nrfutil
            chmod +x nrfutil
            ./nrfutil install toolchain-manager

      - name: Find proper toolchain bundle
        id: set-tb-id
        run: echo "TOOLCHAIN_BUNDLE_NAME=ncs-toolchain-x86_64-linux-$(./nrf/scripts/print_toolchain_checksum.sh).tar.gz" >> $GITHUB_OUTPUT

      - name: Restore toolchain bundle from cache
        id: restore-cached-tb
        uses: actions/cache/restore@v4
        with:
          path: ${{steps.set-tb-id.outputs.TOOLCHAIN_BUNDLE_NAME}}
          key: ${{steps.set-tb-id.outputs.TOOLCHAIN_BUNDLE_NAME}}

      - name: Download toolchain bundle if not cached
        if: steps.restore-cached-tb.outputs.cache-hit != 'true'
        run: wget https://files.nordicsemi.com/artifactory/NCS/external/bundles/v3/${{steps.set-tb-id.outputs.TOOLCHAIN_BUNDLE_NAME}}

      - name: Save toolchain bundle to cache
        if: steps.restore-cached-tb.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{steps.set-tb-id.outputs.TOOLCHAIN_BUNDLE_NAME}}
          key: ${{steps.set-tb-id.outputs.TOOLCHAIN_BUNDLE_NAME}}

      - name: Install proper toolchain bundle
        run: ./nrfutil toolchain-manager install --toolchain-bundle ${{steps.set-tb-id.outputs.TOOLCHAIN_BUNDLE_NAME}}

      - name: Build Serial Modem for PR
        if: github.event_name == 'pull_request'
        run: |
          ./nrfutil toolchain-manager launch --chdir serial_modem -- west twister -T . -v --inline-logs --overflow-as-errors --integration --exclude-tag exclude_integration

      - name: Build Serial Modem nightly
        if: ${{ github.event_name == 'schedule' || inputs.trigger_source == 'release-workflow' }}
        run: |
          ./nrfutil toolchain-manager launch --chdir serial_modem -- west twister -T . -v --inline-logs --overflow-as-errors --all

      - name: Rename binaries
        #if: ${{ inputs.trigger_source == 'release-workflow' }}
        working-directory: serial_modem
        run: |
          mkdir -p artifacts
          VERSION=${{ github.event.release.tag_name || github.ref_name || 'unknown-version' }}
          NRF9151DK_DIR=twister-out/nrf9151dk_nrf9151_ns/zephyr/serial_modem/app
          NRF54L15DK_DIR=twister-out/nrf54l15dk_nrf54l15_cpuapp/zephyr/serial_modem/samples

          # Sysbuild release bundle: merged hex, Kconfig, signed images, elf, DFU zip → artifacts/${base}.zip
          zip_artifacts() {
            local src_dir="$1"
            local base="$2"
            local host="$3"
            local stage root
            root=$(pwd)
            stage=$(mktemp -d)

            cp "${src_dir}/merged.hex" "${stage}/${base}.hex"
            cp "${src_dir}/app/zephyr/.config" "${stage}/${base}.config"
            cp "${src_dir}/app/zephyr/zephyr.signed.bin" "${stage}/${base}.signed.bin"
            cp "${src_dir}/app/zephyr/zephyr.signed.hex" "${stage}/${base}.signed.hex"
            cp "${src_dir}/app/zephyr/zephyr.elf" "${stage}/${base}.elf"
            if not host; then
              cp "${src_dir}/dfu_application.zip" "${stage}/${base}_dfu.zip"
            fi
            (cd "$stage" && zip -q -r "$root/artifacts/${base}.zip" .)
            rm -rf "$stage"
          }

          # nRF9151 DK ext MCU builds
          zip_artifacts "${NRF9151DK_DIR}/serial_modem.ppp_cmux_with_extmcu" "serial_modem_${VERSION}_nrf9151dk_extmcu"
          zip_artifacts "${NRF9151DK_DIR}/serial_modem.ppp_cmux_with_extmcu.mtrace" "serial_modem_${VERSION}_nrf9151dk_extmcu_mtrace"

          # nRF9151 DK normal builds (serial_modem.ppp_cmux)
          zip_artifacts "${NRF9151DK_DIR}/serial_modem.ppp_cmux" "serial_modem_${VERSION}_nrf9151dk_normal"
          zip_artifacts "${NRF9151DK_DIR}/serial_modem.ppp_cmux.mtrace" "serial_modem_${VERSION}_nrf9151dk_normal_mtrace"

          # nRF54L15 DK AT client shell build
          zip_artifacts "${NRF54L15DK_DIR}/sm_at_client_shell/sample.sm_at_client_shell" "sm_at_client_shell_${VERSION}_nrf54l15dk" 1

          # nRF54L15 DK PPP shell build
          zip_artifacts "${NRF54L15DK_DIR}/sm_ppp_shell/sample.sm_ppp_shell" "sm_ppp_shell_${VERSION}_nrf54l15dk" 1

      - name: Upload artifacts
        #if: ${{ inputs.trigger_source == 'release-workflow' }}
        uses: actions/upload-artifact@v4
        with:
          path: serial_modem/artifacts/*
